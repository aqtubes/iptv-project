name: IPTV weekly sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 5"

concurrency:
  group: iptv-weekly-sync
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run IPTV sync
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON_B64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python iptv_weekly_sync.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-report
          path: |
            iptv_work/report.json
            iptv_work/bollywood_only.m3u
